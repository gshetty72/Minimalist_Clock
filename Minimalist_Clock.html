<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimalist Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: white; }

#tz-widget {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
  width: 180px;
  font-family: 'Geist', system-ui, -apple-system, sans-serif;
}

#tz-btn {
  position: relative;
  z-index: 2;
  background: #272727;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 16px;
  cursor: pointer;
  width: 100%;
  border: 1px solid transparent;
  transition: border-color 0.15s ease;
}

#tz-widget.open #tz-btn {
  border-color: #525252;
}

.tz-icon {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 2.5px;
  width: 22px;
}

.tz-icon span {
  display: block;
  width: 100%;
  height: 1.5px;
  background: white;
  border-radius: 1px;
}

#tz-time-label {
  color: white;
  font-size: 14px;
  font-weight: 300;
  white-space: nowrap;
  line-height: normal;
}

#tz-dropdown {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  background: #272727;
  border-radius: 20px;
  z-index: 1;
  padding-top: 39px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-4px);
  transition: opacity 0.15s ease, transform 0.15s ease;
}

#tz-widget.open #tz-dropdown {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

.tz-option {
  padding: 7px 16px;
  color: white;
  font-size: 14px;
  font-weight: 300;
  white-space: nowrap;
  cursor: pointer;
  text-align: center;
  line-height: normal;
  transition: background 0.1s;
}

.tz-option:hover {
  background: #363636;
}

.tz-option.active {
  color: #888;
}
</style>
</head>
<body>

<div id="tz-widget">
  <div id="tz-btn">
    <div class="tz-icon" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <span id="tz-time-label">12:00 AM EST</span>
  </div>
  <div id="tz-dropdown">
    <div class="tz-option active" data-tz="EST">EST (UTC − 5:00)</div>
    <div class="tz-option" data-tz="AST">AST (UTC − 4:00)</div>
    <div class="tz-option" data-tz="CST">CST (UTC − 6:00)</div>
    <div class="tz-option" data-tz="MST">MST (UTC − 7:00)</div>
    <div class="tz-option" data-tz="PST">PST (UTC − 8:00)</div>
    <div class="tz-option" data-tz="AKST">AKST (UTC − 9:00)</div>
    <div class="tz-option" data-tz="HST">HST (UTC − 10:00)</div>
  </div>
</div>

<script>
// IANA names so Intl.DateTimeFormat handles DST automatically
const TZ = {
  'EST':  'America/New_York',
  'AST':  'America/Halifax',
  'CST':  'America/Chicago',
  'MST':  'America/Denver',
  'PST':  'America/Los_Angeles',
  'AKST': 'America/Anchorage',
  'HST':  'Pacific/Honolulu',
};
let currentTz = 'EST';
let currentHourAngle = null;
let isAnimating = false;
let animationId = null;

function getTZComponents() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: TZ[currentTz],
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hourCycle: 'h23',
  }).formatToParts(now);
  const v = type => parseInt(parts.find(p => p.type === type)?.value ?? '0');
  return { h: v('hour'), m: v('minute'), s: v('second'), ms: now.getMilliseconds() };
}

function calcHourAngle({ h, m, s, ms }) {
  const ss = s + ms / 1000;
  const mm = m + ss / 60;
  return ((h % 12) + mm / 60) * 30 - 90;
}

function tick() {
  const c = getTZComponents();
  const ss = c.s + c.ms / 1000;
  const mm = c.m + ss / 60;

  if (!isAnimating) {
    const angle = calcHourAngle(c);
    currentHourAngle = angle;
    document.getElementById('hH').setAttribute('transform', `rotate(${angle},0,0.5)`);
  }

  document.getElementById('mH').setAttribute('transform', `rotate(${mm * 6},0.5,35.6858)`);
  document.getElementById('sH').setAttribute('transform', `rotate(${ss * 6 - 90},0,0.5)`);

  const ampm = c.h >= 12 ? 'PM' : 'AM';
  const h12 = c.h % 12 || 12;
  document.getElementById('tz-time-label').textContent =
    `${h12}:${String(c.m).padStart(2,'0')} ${ampm} ${currentTz}`;
}

function animateHourTo(targetAngle) {
  if (animationId) { cancelAnimationFrame(animationId); animationId = null; }

  const fromAngle = currentHourAngle;
  const delta = ((targetAngle - fromAngle) % 360 + 360) % 360;
  if (delta < 0.1) { isAnimating = false; return; }

  const duration = Math.max(500, (delta / 360) * 1500);
  const start = performance.now();
  isAnimating = true;

  function ease(x) {
    return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
  }

  function frame(now) {
    const progress = Math.min((now - start) / duration, 1);
    currentHourAngle = fromAngle + delta * ease(progress);
    document.getElementById('hH').setAttribute('transform', `rotate(${currentHourAngle},0,0.5)`);
    if (progress < 1) {
      animationId = requestAnimationFrame(frame);
    } else {
      currentHourAngle = targetAngle;
      isAnimating = false;
      animationId = null;
    }
  }

  animationId = requestAnimationFrame(frame);
}

const widget = document.getElementById('tz-widget');
const btn    = document.getElementById('tz-btn');

btn.addEventListener('click', e => {
  e.stopPropagation();
  widget.classList.toggle('open');
});

document.querySelectorAll('.tz-option').forEach(opt => {
  opt.addEventListener('click', e => {
    e.stopPropagation();
    const newTz = opt.dataset.tz;
    if (newTz !== currentTz) {
      currentTz = newTz;
      animateHourTo(calcHourAngle(getTZComponents()));
    }
    document.querySelectorAll('.tz-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    widget.classList.remove('open');
  });
});

document.addEventListener('click', () => widget.classList.remove('open'));

setInterval(tick, 50);
tick();
</script>
